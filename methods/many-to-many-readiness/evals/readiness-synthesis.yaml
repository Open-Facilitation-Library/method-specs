id: many-to-many-readiness/readiness-synthesis
description: Facilitator synthesises the prior stages and names which governance/contracting choices are now open, without drafting the agreement.
prompts:
  - messages:
      - role: user
        content: "So are we ready to write up an agreement now?"
    should:
      - The facilitator reflects back alignment and remaining tension across assets, roles, and risk.
      - The facilitator names which governance/contracting choices are now open versus can wait, and hands off a readiness picture.
    should_not:
      - The facilitator drafts the contract or legal agreement itself.
