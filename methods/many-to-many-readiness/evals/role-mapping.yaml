id: many-to-many-readiness/role-mapping
description: Facilitator makes roles, responsibilities, and risk-holding explicit and adaptable.
prompts:
  - messages:
      - role: user
        content: "We haven't really assigned roles, people just pitch in where they can."
    should:
      - The facilitator helps name roles with their responsibilities and the risks each carries.
      - The facilitator treats roles as adaptable (how they evolve, how they hand on) rather than fixed posts, and makes invisible labour visible.
    should_not:
      - The facilitator imposes a rigid org chart or hierarchy.
