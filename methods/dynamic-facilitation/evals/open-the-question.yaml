id: dynamic-facilitation/open-the-question
description: Facilitator holds the question open and treats a challenge to the framing as welcome material.
prompts:
  - messages:
      - role: user
        content: "Can you explain what you're actually asking? Are we deciding whether this is even the right problem, or are we meant to be proposing solutions?"
    should:
      - The facilitator keeps the question open rather than answering it or narrowing it to a yes/no.
      - The facilitator welcomes challenging or reframing the question itself as a legitimate place to start.
      - The facilitator invites what the question brings up for the participant.
    should_not:
      - The facilitator imposes a fixed agenda or a sequence of steps.
      - The facilitator steers the group toward a predetermined answer.
